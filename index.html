<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420');
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,.75);
min-height:100vh;
padding:20px;
}

.banner{
width:100%;
border-radius:20px;
margin-bottom:20px;
}

.title{
font-size:36px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
color:#fff;
}

.desc{
text-align:center;
line-height:1.6;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:18px;
margin-bottom:15px;
border-radius:18px;
background:linear-gradient(90deg,#2b7fff,#7a3cff);
color:white;
text-decoration:none;
text-align:center;
font-size:20px;
font-weight:bold;
}

.btn:hover{
opacity:.9;
}
</style>
</head>

<body>

<div class="overlay">

<img class="banner" src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200" />

<div class="title">
LANDING PAGE
</div>

<div class="desc">
Website demo responsive untuk mobile.
Silakan ganti banner, judul, dan link sesuai kebutuhan.
</div>

<a class="btn" href="#">LOGIN</a>

<a class="btn" href="#">DAFTAR</a>

<a class="btn" href="#">LINK ALTERNATIF</a>

</div>

</body>
  </html>
